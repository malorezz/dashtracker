<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#17212b" />
    <title>DashTracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Apply dark/light class before React mounts to avoid flash
      ;(function () {
        var tg = window.Telegram && window.Telegram.WebApp
        // Only trust colorScheme if actually running inside Telegram (initData present)
        var scheme = (tg && tg.initData) ? tg.colorScheme : 'dark'
        if (scheme !== 'light') {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
